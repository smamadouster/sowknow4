[tool.ruff]
# Target Python version
target-version = "py311"

# Directories to exclude from linting
exclude = [
    ".git",
    ".venv",
    "venv",
    "__pycache__",
    "alembic/versions",
    ".pytest_cache",
    "htmlcov",
]

line-length = 120

[tool.ruff.lint]
# Rules enabled
select = [
    "E",    # pycodestyle errors
    "F",    # pyflakes
    "W",    # pycodestyle warnings
    "I",    # isort (import sorting)
    "N",    # pep8-naming
    "UP",   # pyupgrade (modern Python syntax)
    "S",    # flake8-bandit (security)
    "B",    # flake8-bugbear
    "A",    # flake8-builtins (shadowed builtins)
    "C4",   # flake8-comprehensions
    "PT",   # flake8-pytest-style
]

# Rules ignored project-wide (with rationale)
ignore = [
    # E402: Module level import not at top of file
    # Intentional: lazy imports to avoid circular dependencies and optional deps
    "E402",

    # E712: Avoid equality comparisons to True/False
    # SQLAlchemy ORM filter expressions require == True for column comparisons
    "E712",

    # E711: Comparison to None
    # Some SQLAlchemy expressions require == None syntax for query construction
    "E711",

    # F841: Local variable assigned but never used
    # Common in exception handlers and test setup fixtures
    "F841",

    # E722: Bare except
    # Some legacy code uses bare except as a last-resort catch-all
    "E722",

    # E501: Line too long
    # Complex business logic and long string literals are unavoidable in some cases
    "E501",

    # W293: Whitespace before blank line
    "W293",

    # S101: Use of assert — allowed in tests and FastAPI Depends()
    "S101",

    # B008: Do not perform function calls in argument defaults — FastAPI Depends() pattern
    "B008",

    # N805: First argument of a method should be named 'self' — Pydantic validators use 'cls'
    "N805",

    # S104: Possible binding to all interfaces — needed for Docker containers
    "S104",

    # S106: Possible hardcoded password — false positives on field names like "password"
    "S106",

    # A003: Class attribute shadows a built-in — SQLAlchemy models commonly use 'type', 'id', 'format'
    "A003",

    # S105: Possible hardcoded password — false positives on cookie names, token var names
    "S105",

    # S110: try-except-pass — used intentionally for best-effort cleanup/logging
    "S110",

    # S108: Probable insecure usage of temp file/directory — false positives
    "S108",

    # N806: Variable in function should be lowercase — constant-like vars in functions (RATE_LIMIT, etc.)
    "N806",

    # N802: Function name should be lowercase — SQLAlchemy event listener naming
    "N802",

    # N803: Argument name should be lowercase — external API conventions
    "N803",

    # N818: Exception name should end with 'Error' — legacy exception classes
    "N818",

    # PT028: pytest-style: default argument in test function — false positive on FastAPI endpoints named test_*
    "PT028",

    # A002: Argument shadows a built-in — FastAPI endpoints commonly use 'format', 'type', etc.
    "A002",

    # B904: Within except clause, raise with from — too noisy for HTTPException re-raises
    "B904",

    # S607: Starting a process with a partial executable path
    "S607",
]

# Per-file rule overrides
[tool.ruff.lint.per-file-ignores]
# __init__.py files: F401 (unused imports) are re-exports — intentional
"__init__.py" = ["F401"]
# Test files: allow security warnings, unused imports, bugbear
"tests/**/*.py" = ["F401", "F811", "S", "B"]
# Alembic env: E402 is structurally required
"alembic/env.py" = ["E402"]
# Scripts: allow security warnings
"scripts/**/*.py" = ["S"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false

[tool.mypy]
python_version = "3.11"
strict = false
ignore_missing_imports = true
namespace_packages = true
explicit_package_bases = true
# Enforce annotations only on well-typed modules (API, main)
disallow_untyped_defs = false
disallow_incomplete_defs = true
check_untyped_defs = true
warn_return_any = false
warn_unused_ignores = false
no_implicit_optional = true
exclude = [
    "alembic/",
    "scripts/",
    "tests/",
]

# SQLAlchemy Column[T] false positives: suppress across all app modules
[[tool.mypy.overrides]]
module = "app.*"
disallow_untyped_defs = false
disallow_incomplete_defs = false
disable_error_code = [
    "no-untyped-def",  # Incremental annotation adoption
    "assignment",      # Column[str] = "value" false positives
    "arg-type",        # Column[str] passed as str
    "union-attr",      # Optional column attribute access
    "var-annotated",   # SQLAlchemy Column declarations
    "operator",        # Column comparison operators
    "return-value",    # Column return types
    "override",        # Starlette dispatch overrides
    "func-returns-value",  # Async/sync function confusion
    "call-overload",   # Dynamic call patterns
    "dict-item",       # Mixed dict value types
    "attr-defined",    # Dynamic attributes on ORM models
    "call-arg",        # Optional arg patterns
    "misc",            # Miscellaneous SQLAlchemy-related
    "valid-type",      # Dynamic type expressions
    "has-type",        # Deferred type resolution
    "type-var",        # Generic type variables
    "unused-coroutine", # Fire-and-forget async patterns
    "index",           # Dynamic indexing
    "return",          # Missing return in dynamic branches
]
