[pytest]
# Pytest configuration for SOWKNOW

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    -p no:warnings
    --ignore=tests/test_e2e.py

# Markers
markers =
    unit: Unit tests (fast, isolated, SQLite-safe)
    integration: Integration tests (require PostgreSQL)
    e2e: End-to-end tests (require PostgreSQL)
    performance: Performance tests (require PostgreSQL + Redis)
    benchmark: Collection pipeline performance benchmarks (targets enforced, requires Docker)
    requires_postgres: Test requires PostgreSQL (auto-skipped on SQLite)
    slow: Slow tests
    knowledge_graph: Knowledge graph related tests
    multi_agent: Multi-agent system tests
    auth: Authentication tests
    api: API endpoint tests

# Coverage options
[coverage:run]
source = app
omit =
    */tests/*
    */migrations/*
    */venv/*
    */__pycache__/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov
