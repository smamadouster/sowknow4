services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: sowknow4-postgres-dev
    environment:
      POSTGRES_DB: sowknow
      POSTGRES_USER: sowknow
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"  # localhost only — not exposed to other hosts
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sowknow"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2048m
          cpus: '1.5'

  redis:
    image: redis:7-alpine
    container_name: sowknow4-redis-dev
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "127.0.0.1:6379:6379"  # localhost only — not exposed to other hosts
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: sowknow4-backend-dev
    environment:
      DATABASE_URL: postgresql://sowknow:${DATABASE_PASSWORD}@postgres:5432/sowknow
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
      KIMI_API_KEY: ${KIMI_API_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    deploy:
      resources:
        limits:
          memory: 1024m
          cpus: '1.0'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
      args:
        - JWT_SECRET=${JWT_SECRET}
        - NEXT_PUBLIC_API_URL=/api
    container_name: sowknow4-frontend-dev
    environment:
      - NEXT_PUBLIC_API_URL=/api
      - JWT_SECRET=${JWT_SECRET}
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: sowknow4-celery-worker-dev
    environment:
      DATABASE_URL: postgresql://sowknow:${DATABASE_PASSWORD}@postgres:5432/sowknow
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    volumes:
      - ./backend:/app
      - ./data:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2 -Q celery,document_processing,scheduled,collections
    deploy:
      resources:
        limits:
          memory: 1280m
          cpus: '1.5'

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: sowknow4-celery-beat-dev
    environment:
      DATABASE_URL: postgresql://sowknow:${DATABASE_PASSWORD}@postgres:5432/sowknow
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: celery -A app.celery_app beat --loglevel=info
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.25'

  telegram-bot:
    image: sowknow4-telegram-bot:latest
    container_name: sowknow4-telegram-bot-dev
    environment:
      BACKEND_URL: http://backend:8000
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      BOT_API_KEY: ${BOT_API_KEY}
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'

volumes:
  postgres-data:
