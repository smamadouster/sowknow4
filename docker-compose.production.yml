# SOWKNOW Production Docker Compose
# Domain: sowknow.gollamtech.com
#
# NOTE ON MEMORY: The original 6.4GB budget did not include the embed-server,
# rerank-server, or per-stage Celery workers required by the document pipeline.
# This file now includes those services.  The minimum realistic footprint is
# ~13GB; deploy on a host with at least 16GB (ideally 32GB) and tune limits
# based on observed load.
#
# CRITICAL - API Keys Configuration:
# Before deployment, ensure these environment variables are set in .secrets or backend/.env.production:
#   - GEMINI_API_KEY: Required for public document processing
#   - OCR_ENGINE: OCR engine (paddle or tesseract)
#   - POSTGRES_PASSWORD: Database password
#   - REDIS_PASSWORD: Redis password
#   - SECRET_KEY: JWT secret for authentication
#   - JWT_SECRET_KEY: JWT signing key
#
# Memory & CPU Allocation Summary (revised):
#   postgres:        1920MB cpus: 1.5  (Database with pgvector)
#   redis:           512MB  cpus: 0.5  (Cache & message queue)
#   backend:         1GB    cpus: 1.0  (FastAPI application)
#   embed-server:    4096MB cpus: 1.5  (Embedding model)
#   rerank-server:   1024MB cpus: 0.5  (Reranking model)
#   celery-light:    1024MB cpus: 1.0  (OCR/chunk/index + general tasks)
#   celery-heavy:    1536MB cpus: 1.0  (pipeline.embed -> embed-server)
#   celery-entities: 1536MB cpus: 1.0  (pipeline.entities NER/LLM)
#   celery-articles: 1024MB cpus: 0.5  (pipeline.articles)
#   celery-collections: 512MB cpus: 0.5 (collections queue)
#   celery-beat:     512MB  cpus: 0.25 (Scheduled tasks)
#   telegram-bot:    256MB  cpus: 0.5  (Mobile interface)
#   frontend:        512MB  cpus: 1.0  (Next.js application)
#   nginx:           256MB  cpus: 0.5  (Reverse proxy, profile-gated)
#   certbot:         128MB  cpus: 0.25 (SSL certificate management)
#   prometheus:      256MB  cpus: 0.25 (Metrics scraper)
#   ollama:          SHARED (Uses ghostshell-api on host, no container memory)
#   TOTAL MEMORY:   ~15300MB
#   TOTAL CPU:       ~11.0 (CFS scheduler time-sliced on shared VPS)
#
# Backup Strategy:
#   - Daily PostgreSQL dumps: docker exec sowknow-postgres pg_dump -U sowknow sowknow > backup_$(date +%Y%m%d).sql
#   - Weekly encrypted offsite backup to secure storage
#   - Monthly restore test to verify backup integrity
#   - 7-4-3 retention policy: 7 daily, 4 weekly, 3 monthly backups

version: '3.8'

services:
  # PostgreSQL with pgvector
  postgres:
    image: pgvector/pgvector:pg16
    container_name: sowknow-postgres
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1920m
          cpus: '1.5'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sowknow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-sowknow}
      POSTGRES_INITDB_ARGS: "-E UTF8"
    volumes:
      - sowknow-postgres-data:/var/lib/postgresql/data
    networks:
      - sowknow-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sowknow} -d ${POSTGRES_DB:-sowknow}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    shm_size: '512mb'

  # Redis
  redis:
    image: redis:7-alpine
    container_name: sowknow-redis
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - sowknow-redis-data:/data
    networks:
      - sowknow-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sowknow-backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1024m
          cpus: '1.0'
    env_file:
      - .env
    environment:
      # DATABASE_URL and REDIS_URL are loaded from .env
      # to avoid URL parsing issues with special characters in passwords
      - DATABASE_URL=postgresql://${DATABASE_USER:-sowknow}:${DATABASE_PASSWORD:-}@postgres:5432/${DATABASE_NAME:-sowknow}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis:6379/0
      - EMBED_SERVER_URL=http://embed-server:8000,http://embed-server-2:8000
      - RERANK_SERVER_URL=http://rerank-server:8000
      - CELERY_MEMORY_WARN_MB=2048
      - CELERY_MEMORY_CRIT_MB=2560
    volumes:
      - sowknow-public-data:/data/public
      - sowknow-confidential-data:/data/confidential
      - sowknow-backups:/app/backups
    # The backend is bound to loopback only (127.0.0.1:8001) so the host nginx
    # reverse proxy can reach it, but external clients cannot bypass nginx and
    # hit the backend over plain HTTP.  All public traffic must still route
    # through nginx for HTTPS redirect, HSTS, rate limits and security headers.
    ports:
      - "127.0.0.1:8001:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    entrypoint: ["/bin/sh", "/app/entrypoint.sh"]
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    networks:
      - sowknow-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f -H 'Host: sowknow.gollamtech.com' http://localhost:8000/api/v1/health || curl -f http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s


  # Embedding microservice
  embed-server:
    build:
      context: ./backend
      dockerfile: Dockerfile.embed
    container_name: sowknow-embed-server
    restart: unless-stopped
    environment:
      - SENTENCE_TRANSFORMERS_HOME=/models
      - HF_HOME=/models
      - TRANSFORMERS_CACHE=/models
      - OMP_NUM_THREADS=1
      - MKL_NUM_THREADS=1
      - OPENBLAS_NUM_THREADS=1
      - VECLIB_MAXIMUM_THREADS=1
      - NUMEXPR_NUM_THREADS=1
      - EMBED_MAX_BATCH_SIZE=64
      - EMBED_BATCH_WINDOW_MS=100
    volumes:
      - ./backend:/app
      - sowknow-model-cache:/models
    command: >
      uvicorn embed_server.main:app --host 0.0.0.0 --port 8000
      --workers 1 --limit-max-requests 10000
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health | grep -q '\"status\"' || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 8
      start_period: 300s
    deploy:
      resources:
        limits:
          memory: 4096m
          cpus: '1.5'
    networks:
      - sowknow-net

  # Reranking microservice
  rerank-server:
    build:
      context: ./backend/rerank_server
      dockerfile: Dockerfile
    container_name: sowknow-rerank-server
    restart: unless-stopped
    environment:
      - RERANK_PORT=8000
      - RERANK_MODEL=cross-encoder/ms-marco-MiniLM-L-6-v2
      - SENTENCE_TRANSFORMERS_HOME=/models
      - HF_HOME=/models
      - TRANSFORMERS_CACHE=/models
    volumes:
      - sowknow-model-cache:/models
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 8
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 1024m
          cpus: '0.5'
    networks:
      - sowknow-net

  # Celery workers — one per pipeline stage so a single slow stage cannot starve the others.
  # Memory/CPU allocations are reduced vs docker-compose.yml to fit a smaller VPS; tune upward
  # if embedding throughput or entity extraction becomes a bottleneck.
  celery-light:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sowknow-celery-light
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1024m
          cpus: '1.0'
    command: >-
      celery -A app.celery_app worker --loglevel=info --concurrency=2
      --max-tasks-per-child=20
      -Q celery,document_processing,scheduled,pipeline.ocr,pipeline.chunk,pipeline.index
      -n light@%h
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${DATABASE_USER:-sowknow}:${DATABASE_PASSWORD:-}@postgres:5432/${DATABASE_NAME:-sowknow}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis:6379/0
      - EMBED_SERVER_URL=http://embed-server:8000
      - RERANK_SERVER_URL=http://rerank-server:8000
      - CELERY_MEMORY_WARN_MB=768
      - CELERY_MEMORY_CRIT_MB=896
    volumes:
      - sowknow-public-data:/data/public
      - sowknow-confidential-data:/data/confidential
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - sowknow-net
    depends_on:
      - postgres
      - redis
      - backend
      - embed-server
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.celery_app inspect ping --timeout 10 -d light@$$HOSTNAME 2>/dev/null | grep -q OK || cat /proc/1/cmdline 2>/dev/null | tr '\\0' ' ' | grep -q celery || exit 1"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 90s

  celery-entities:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sowknow-celery-entities
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1536m
          cpus: '1.0'
    command: >-
      celery -A app.celery_app worker --loglevel=info --concurrency=2
      --pool=prefork
      -Q pipeline.entities
      --prefetch-multiplier=1
      -n entities@%h
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${DATABASE_USER:-sowknow}:${DATABASE_PASSWORD:-}@postgres:5432/${DATABASE_NAME:-sowknow}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis:6379/0
      - CELERY_MEMORY_WARN_MB=1152
      - CELERY_MEMORY_CRIT_MB=1382
    volumes:
      - sowknow-public-data:/data/public
      - sowknow-confidential-data:/data/confidential
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - sowknow-net
    depends_on:
      - postgres
      - redis
      - backend
    healthcheck:
      test: ["CMD-SHELL", "cat /proc/1/cmdline 2>/dev/null | tr '\\0' ' ' | grep -q celery || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s

  celery-articles:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sowknow-celery-articles
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1024m
          cpus: '0.5'
    command: >-
      celery -A app.celery_app worker --loglevel=info --concurrency=2
      --max-tasks-per-child=10
      -Q pipeline.articles
      --prefetch-multiplier=1
      -n articles@%h
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${DATABASE_USER:-sowknow}:${DATABASE_PASSWORD:-}@postgres:5432/${DATABASE_NAME:-sowknow}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis:6379/0
      - CELERY_MEMORY_WARN_MB=768
      - CELERY_MEMORY_CRIT_MB=896
    volumes:
      - sowknow-public-data:/data/public
      - sowknow-confidential-data:/data/confidential
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - sowknow-net
    depends_on:
      - postgres
      - redis
      - backend
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.celery_app inspect ping --timeout 10 -d articles@$$HOSTNAME 2>/dev/null | grep -q OK || cat /proc/1/cmdline 2>/dev/null | tr '\\0' ' ' | grep -q celery || exit 1"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 90s

  celery-heavy:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sowknow-celery-heavy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1536m
          cpus: '1.0'
    command: >-
      celery -A app.celery_app worker --loglevel=info --concurrency=4
      --pool=prefork
      --max-tasks-per-child=10
      -Q pipeline.embed
      --prefetch-multiplier=1
      -n heavy@%h
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${DATABASE_USER:-sowknow}:${DATABASE_PASSWORD:-}@postgres:5432/${DATABASE_NAME:-sowknow}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis:6379/0
      - EMBED_SERVER_URL=http://embed-server:8000
      - EMBED_CHUNK_CAP=512
      - CELERY_MEMORY_WARN_MB=1152
      - CELERY_MEMORY_CRIT_MB=1382
    volumes:
      - sowknow-public-data:/data/public
      - sowknow-confidential-data:/data/confidential
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - sowknow-net
    depends_on:
      - postgres
      - redis
      - backend
      - embed-server
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.celery_app inspect ping --timeout 10 -d heavy@$$HOSTNAME 2>/dev/null | grep -q OK || cat /proc/1/cmdline 2>/dev/null | tr '\\0' ' ' | grep -q celery || exit 1"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 120s

  celery-collections:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sowknow-celery-collections
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2 -Q collections --without-heartbeat
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${DATABASE_USER:-sowknow}:${DATABASE_PASSWORD:-}@postgres:5432/${DATABASE_NAME:-sowknow}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis:6379/0
      - CELERY_MEMORY_WARN_MB=384
      - CELERY_MEMORY_CRIT_MB=448
    volumes:
      - sowknow-public-data:/data/public
      - sowknow-confidential-data:/data/confidential
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - sowknow-net
    depends_on:
      - postgres
      - redis
      - backend
    healthcheck:
      test: ["CMD-SHELL", "cat /proc/1/cmdline 2>/dev/null | tr '\\0' ' ' | grep -q celery || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Celery Beat - Scheduled Tasks
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sowknow-celery-beat
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.25'
    command: celery -A app.celery_app beat --loglevel=info
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${DATABASE_USER:-sowknow}:${DATABASE_PASSWORD:-}@postgres:5432/${DATABASE_NAME:-sowknow}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis:6379/0
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - sowknow-net
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -H 'Host: sowknow.gollamtech.com' http://backend:8000/api/v1/health || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # JWT_SECRET must NEVER be passed to the frontend build.
        - NEXT_PUBLIC_API_URL=https://sowknow.gollamtech.com/api
        - NEXT_PUBLIC_APP_URL=https://sowknow.gollamtech.com
    container_name: sowknow-frontend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://sowknow.gollamtech.com/api
      - NEXT_PUBLIC_APP_URL=https://sowknow.gollamtech.com
      # JWT_SECRET is not needed by the frontend runtime; middleware only checks
      # cookie presence and the backend validates tokens cryptographically.
    ports:
      - "3000:3000"
    networks:
      - sowknow-net
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || curl -f http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Nginx Reverse Proxy
  # NOTE: In production, Caddy (ghostshell-caddy) handles reverse proxy and SSL.
  # Do NOT start this nginx container - it will conflict with Caddy on ports 80/443.
  # This configuration is kept for reference and development environments only.
  nginx:
    profiles: ["nginx"]  # Only start with: docker-compose --profile nginx up -d
    image: nginx:alpine
    container_name: sowknow-nginx
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-conf:/etc/letsencrypt:ro
    networks:
      - sowknow-net
    depends_on:
      - frontend
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:80"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # Certbot for Let's Encrypt SSL
  certbot:
    image: certbot/certbot:latest
    container_name: sowknow-certbot
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.25'
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - sowknow-net

  # Telegram Bot - Mobile Interface
  telegram-bot:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: sowknow-telegram-bot:latest
    container_name: sowknow-telegram-bot
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'
    env_file:
      - .env
      - .secrets
    environment:
      - BACKEND_URL=http://backend:8000
    command: ["python", "-m", "telegram_bot.bot"]
    networks:
      - sowknow-net
    depends_on:
      - backend
      - postgres
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'python.*telegram_bot' || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Prometheus - scrapes backend /metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: sowknow-prometheus
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.25'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - sowknow-prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - sowknow-net
    depends_on:
      - backend

  # Guardian HC - autonomous observability & self-healing
  guardian-hc:
    build:
      context: ./monitoring/guardian-hc
      dockerfile: Dockerfile
    container_name: sowknow-guardian-hc
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.25'
    pid: "host"
    privileged: true
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - GMAIL_SMTP_USER=${GMAIL_SMTP_USER}
      - GMAIL_SMTP_PASSWORD=${GMAIL_SMTP_PASSWORD}
      - GUARDIAN_DB_PASSWORD=${GUARDIAN_DB_PASSWORD}
      - GUARDIAN_LOG_DIR=/tmp
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./monitoring/guardian-hc/guardian-hc.sowknow4.yml:/config/guardian-hc.yml:ro
      - ./monitoring/guardian-hc/runbooks:/app/runbooks:ro
      - /proc:/host/proc:ro
    networks:
      - sowknow-net
    depends_on:
      - backend
      - postgres
      - redis

volumes:
  sowknow-prometheus-data:
    driver: local
  sowknow-postgres-data:
    driver: local
  sowknow-redis-data:
    driver: local
  sowknow-public-data:
    driver: local
  sowknow-confidential-data:
    driver: local
  sowknow-backups:
    driver: local
  sowknow-model-cache:
    driver: local
  certbot-www:
    driver: local
  certbot-conf:
    driver: local

networks:
  sowknow-net:
    driver: bridge

# ---------------------------------------------------------------------------
# Docker secrets — mount secret files from ./secrets/<name>
# Each file must contain only the raw secret value (no quotes, no newlines).
#
# Setup (one-time on the host):
#   mkdir -p ./secrets
#   echo -n "your-jwt-secret-here"      > ./secrets/jwt_secret
#   echo -n "your-encryption-key-here"  > ./secrets/encryption_key
#   echo -n "your-redis-password-here"  > ./secrets/redis_password
#   echo -n "your-db-password-here"     > ./secrets/database_password
#   chmod 600 ./secrets/*
#
# Services consume secrets via <KEY>_FILE env vars, which load_secret()
# reads automatically (see backend/app/core/config.py).
#
# Example in a service's environment block:
#   JWT_SECRET_FILE: /run/secrets/jwt_secret
# ---------------------------------------------------------------------------
secrets:
  jwt_secret:
    file: ./secrets/jwt_secret
  encryption_key:
    file: ./secrets/encryption_key
  redis_password:
    file: ./secrets/redis_password
  database_password:
    file: ./secrets/database_password
