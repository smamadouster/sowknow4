# SOWKNOW4 Docker Compose -- Single Source of Truth
# Domain: sowknow.gollamtech.com
# VPS: Hostinger 32GB shared VPS (upgraded from 16GB on 2026-03-23)
#
# NAMING CONVENTION: All containers use "sowknow4-" prefix. No exceptions.
# PORT POLICY: Only backend (8001) and frontend (3000) exposed to host.
#              Internal services (postgres, redis, vault, nats) are network-only.
#
# Memory Allocation:
#   celery-light:    2048MB  (CPU/IO tasks, concurrency=2)
#   celery-heavy:     512MB  (pipeline.embed queue — I/O-bound HTTP to embed-server)
#   embed-server:    3072MB  (embedding model — 1.3GB model needs headroom during load)
#   postgres:        1536MB  (pgvector, 5 concurrent users)
#   backend:          768MB  (FastAPI)
#   frontend:         512MB  (Next.js)
#   redis:            768MB  (cache/queue — raised from 512MB; allkeys-lru eviction, AOF rewrite fork headroom)
#   vault:            256MB  (secrets)
#   telegram-bot:     256MB  (Telegram interface)
#   celery-beat:      128MB  (scheduler)
#   nats:             128MB  (message broker)
#   guardian-hc:      128MB  (self-healing monitor, monitoring profile)
#   certbot:          128MB  (TLS renewal, tls profile)
#   TOTAL:          ~9344MB  (plenty of headroom on 32GB VPS)

x-common-env: &common-env
  env_file:
    - .env

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"
    labels: "service,environment"
    tag: "{{.Name}}/{{.ID}}"

services:
  # --- Infrastructure ---

  postgres:
    <<: *common-env
    image: pgvector/pgvector:pg16
    container_name: sowknow4-postgres
    restart: unless-stopped
    logging: *default-logging
    environment:
      - POSTGRES_DB=${DATABASE_NAME:-sowknow}
      - POSTGRES_USER=${DATABASE_USER:-sowknow}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD:?DATABASE_PASSWORD must be set in .env}
    volumes:
      - sowknow-postgres-data:/var/lib/postgresql/data
      - sowknow-backups:/backups
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    # NO ports — internal network only. Use: docker exec -it sowknow4-postgres psql -U sowknow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sowknow"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1536M
          cpus: '1.5'
    networks:
      - sowknow-net

  redis:
    image: redis:7-alpine
    container_name: sowknow4-redis
    restart: unless-stopped
    logging: *default-logging
    command: redis-server --appendonly yes --maxmemory 400mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
    volumes:
      - sowknow-redis-data:/data
    # NO ports — internal network only. Use: docker exec -it sowknow4-redis redis-cli
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=$REDIS_PASSWORD redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '0.5'
    networks:
      - sowknow-net

  vault:
    # Gated 2026-04-10: unseal key mismatch makes vault unusable. Backend
    # decoupled from it (b27cd1c). Only starts if `--profile vault-broken`
    # is explicitly passed. To re-enable: remove the `profiles:` line below
    # AND fix the unseal key (recover or re-init).
    profiles: ["vault-broken"]
    image: hashicorp/vault:1.15
    container_name: sowknow4-vault
    restart: unless-stopped
    logging: *default-logging
    environment:
      - VAULT_ADDR=http://127.0.0.1:8200
      - VAULT_API_ADDR=http://127.0.0.1:8200
      - VAULT_LOCAL_CONFIG={"storage":{"file":{"path":"/vault/data"}},"listener":{"tcp":{"address":"0.0.0.0:8200","tls_disable":"1"}},"disable_mlock":true,"ui":false}
      - VAULT_UNSEAL_KEY=${VAULT_UNSEAL_KEY:-}
    command: ["server"]
    volumes:
      - sowknow-vault-data:/vault/data
    # NO ports — internal network only. Use: docker exec -it sowknow4-vault vault status
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD-SHELL", "vault status 2>/dev/null | grep -q 'Sealed.*true' && [ -n \"$$VAULT_UNSEAL_KEY\" ] && vault operator unseal $$VAULT_UNSEAL_KEY >/dev/null 2>&1; vault status 2>/dev/null | grep -q 'Sealed.*false'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    networks:
      - sowknow-net

  nats:
    image: nats:2.10-alpine
    container_name: sowknow4-nats
    restart: unless-stopped
    logging: *default-logging
    command: ["--jetstream", "--store_dir=/data", "-m", "8222"]
    volumes:
      - sowknow-nats-data:/data
    # NO ports — internal network only. Use: docker exec -it sowknow4-nats nats-server --signal reload
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8222/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    networks:
      - sowknow-net

  # --- Application ---

  backend:
    <<: *common-env
    init: true
    security_opt:
      - no-new-privileges:true
    env_file:
      - .env
      - .secrets
    build:
      context: ./backend
      dockerfile: Dockerfile.minimal
    container_name: sowknow4-backend
    restart: unless-stopped
    logging: *default-logging
    environment:
      - DATABASE_URL=postgresql://${DATABASE_USER:-sowknow}:${DATABASE_PASSWORD:?DATABASE_PASSWORD must be set in .env}@postgres:5432/${DATABASE_NAME:-sowknow}
      - REDIS_HOST=redis
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set in .env}
      - KIMI_API_KEY=${KIMI_API_KEY:-}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=gemma2:2b
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=${VAULT_ROOT_TOKEN:?VAULT_ROOT_TOKEN must be set in .env}
      - NATS_URL=nats://nats:4222
      - APP_ENV=${APP_ENV:-production}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS},backend
      - COOKIE_DOMAIN=${COOKIE_DOMAIN}
      - HF_HOME=/models
      - WHISPER_MODEL_SIZE=small
      - EMBED_SERVER_URL=http://embed-server:8000
      - RERANK_SERVER_URL=http://rerank-server:8000
    volumes:
      - sowknow-public-data:/data/public
      - sowknow-confidential-data:/data/confidential
      - sowknow-audio-data:/data/audio
      - sowknow-backups:/app/backups
      - ./backend:/app
      - sowknow-model-cache:/models
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      # vault: temporarily removed — unseal key mismatch, not needed for auth
      #   condition: service_healthy
      nats:
        condition: service_healthy
      embed-server:
        condition: service_healthy
      rerank-server:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      # NOTE: Bind mount loads main.py (not main_minimal.py), so health is at /api/v1/health
      # main_minimal.py has /health at root, but that's overridden by the bind mount.
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/v1/health || curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1536M
          cpus: '1.0'
    networks:
      - sowknow-net

  embed-server:
    init: true
    security_opt:
      - no-new-privileges:true
    build:
      context: ./backend
      dockerfile: Dockerfile.embed
    container_name: sowknow4-embed-server
    restart: unless-stopped
    logging: *default-logging
    environment:
      - SENTENCE_TRANSFORMERS_HOME=/models
      - HF_HOME=/models
      - TRANSFORMERS_CACHE=/models
    volumes:
      - sowknow-model-cache:/models
      - ./backend:/app
    # Periodic worker restart prevents PyTorch memory pool fragmentation
    command: >
      uvicorn embed_server.main:app --host 0.0.0.0 --port 8000
      --workers 1 --limit-max-requests 1000
    # NO ports — internal only. Access: http://embed-server:8000
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health | grep -q '\"status\"' || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 8
      start_period: 300s
    deploy:
      resources:
        limits:
          memory: 4096M
          cpus: '2.0'
    networks:
      - sowknow-net

  rerank-server:
    init: true
    security_opt:
      - no-new-privileges:true
    build:
      context: ./backend/rerank_server
      dockerfile: Dockerfile
    container_name: sowknow4-rerank-server
    restart: unless-stopped
    logging: *default-logging
    environment:
      - RERANK_PORT=8000
      - RERANK_MODEL=cross-encoder/ms-marco-MiniLM-L-6-v2
      - SENTENCE_TRANSFORMERS_HOME=/models
      - HF_HOME=/models
      - TRANSFORMERS_CACHE=/models
    volumes:
      - sowknow-model-cache:/models
    # NO ports — internal only. Access: http://rerank-server:8000
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 8
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: '1.0'
    networks:
      - sowknow-net

  celery-light:
    <<: *common-env
    init: true
    security_opt:
      - no-new-privileges:true
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: sowknow4-celery-light
    restart: unless-stopped
    logging: *default-logging
    environment:
      - DATABASE_URL=postgresql://${DATABASE_USER:-sowknow}:${DATABASE_PASSWORD:?DATABASE_PASSWORD must be set in .env}@postgres:5432/${DATABASE_NAME:-sowknow}
      - REDIS_HOST=redis
      - KIMI_API_KEY=${KIMI_API_KEY:-}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=gemma2:2b
      - SENTENCE_TRANSFORMERS_HOME=/models
      - HF_HOME=/models
      - TRANSFORMERS_CACHE=/models
      - PADDLEOCR_HOME=/tmp/paddleocr
      - SKIP_MODEL_DOWNLOAD=1
      - EMBED_SERVER_URL=http://embed-server:8000
    volumes:
      - sowknow-public-data:/data/public
      - sowknow-confidential-data:/data/confidential
      - sowknow-audio-data:/data/audio
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      embed-server:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "cat /proc/1/cmdline 2>/dev/null | tr '\\0' ' ' | grep -q celery || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 3072M
          cpus: '1.0'
    command: >-
      celery -A app.celery_app worker --loglevel=info --concurrency=2
      -Q celery,document_processing,scheduled,pipeline.ocr,pipeline.chunk,pipeline.index,pipeline.articles,pipeline.entities
      -n light@%h
    networks:
      - sowknow-net

  celery-heavy:
    <<: *common-env
    init: true
    security_opt:
      - no-new-privileges:true
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: sowknow4-celery-heavy
    restart: unless-stopped
    logging: *default-logging
    environment:
      - DATABASE_URL=postgresql://${DATABASE_USER:-sowknow}:${DATABASE_PASSWORD:?DATABASE_PASSWORD must be set in .env}@postgres:5432/${DATABASE_NAME:-sowknow}
      - REDIS_HOST=redis
      - EMBED_SERVER_URL=http://embed-server:8000
      - SKIP_MODEL_DOWNLOAD=1
    volumes:
      - sowknow-public-data:/data/public
      - sowknow-confidential-data:/data/confidential
      - sowknow-audio-data:/data/audio
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      embed-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "cat /proc/1/cmdline 2>/dev/null | tr '\\0' ' ' | grep -q celery || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          # celery-heavy handles pipeline.embed queue; tasks call embed-server via HTTP
          # (no model in this container — 512MB is sufficient for pure I/O work)
          memory: 512M
          cpus: '2.0'
    command: >-
      celery -A app.celery_app worker --loglevel=info --concurrency=2
      --pool=prefork
      -Q pipeline.embed
      --prefetch-multiplier=1
      -n heavy@%h
    networks:
      - sowknow-net

  celery-beat:
    <<: *common-env
    init: true
    security_opt:
      - no-new-privileges:true
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: sowknow4-celery-beat
    restart: unless-stopped
    logging: *default-logging
    environment:
      - DATABASE_URL=postgresql://${DATABASE_USER:-sowknow}:${DATABASE_PASSWORD:?DATABASE_PASSWORD must be set in .env}@postgres:5432/${DATABASE_NAME:-sowknow}
      - REDIS_HOST=redis
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set in .env}
      - KIMI_API_KEY=${KIMI_API_KEY:-}
      - SKIP_MODEL_DOWNLOAD=1
    command: celery -A app.celery_app beat --loglevel=info --schedule=/tmp/celerybeat-schedule
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "cat /proc/1/cmdline 2>/dev/null | tr '\\0' ' ' | grep -q celery || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    networks:
      - sowknow-net

  celery-collections:
    <<: *common-env
    init: true
    security_opt:
      - no-new-privileges:true
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: sowknow4-celery-collections
    restart: unless-stopped
    logging: *default-logging
    environment:
      - DATABASE_URL=postgresql://${DATABASE_USER:-sowknow}:${DATABASE_PASSWORD:?DATABASE_PASSWORD must be set in .env}@postgres:5432/${DATABASE_NAME:-sowknow}
      - REDIS_HOST=redis
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - SKIP_MODEL_DOWNLOAD=1
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "cat /proc/1/cmdline 2>/dev/null | tr '\\0' ' ' | grep -q celery || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2 -Q collections --without-heartbeat
    networks:
      - sowknow-net

  frontend:
    init: true
    security_opt:
      - no-new-privileges:true
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sowknow4-frontend
    restart: unless-stopped
    logging: *default-logging
    environment:
      - NEXT_PUBLIC_API_URL=/api
      - JWT_SECRET=${JWT_SECRET}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    networks:
      - sowknow-net

  telegram-bot:
    <<: *common-env
    init: true
    security_opt:
      - no-new-privileges:true
    env_file:
      - .env
      - .secrets
    build:
      context: ./backend
      dockerfile: Dockerfile.telegram
    container_name: sowknow4-telegram-bot
    restart: on-failure
    logging: *default-logging
    environment:
      - DATABASE_URL=postgresql://${DATABASE_USER:-sowknow}:${DATABASE_PASSWORD:?DATABASE_PASSWORD must be set in .env}@postgres:5432/${DATABASE_NAME:-sowknow}
      - REDIS_HOST=redis
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN must be set}
      - BACKEND_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "cat /proc/1/cmdline 2>/dev/null | tr '\\0' ' ' | grep -q telegram || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    networks:
      - sowknow-net

  # --- Optional profiles (activate with --profile) ---

  certbot:
    image: certbot/certbot:v3.3.0
    container_name: sowknow4-certbot
    restart: unless-stopped
    profiles:
      - tls
    volumes:
      - ./nginx/ssl:/etc/letsencrypt
      - sowknow-certbot-webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done'"
    healthcheck:
      test: ["CMD-SHELL", "certbot --version || exit 1"]
      interval: 300s
      timeout: 10s
      retries: 2
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    networks:
      - sowknow-net

  nginx:
    image: nginx:1.27-alpine
    container_name: sowknow4-nginx
    restart: unless-stopped
    logging: *default-logging
    profiles:
      - nginx
    volumes:
      - ./nginx/nginx-http-only.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - sowknow-certbot-webroot:/var/www/certbot:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    networks:
      - sowknow-net

  guardian-hc:
    build:
      context: ./monitoring/guardian-hc
      dockerfile: Dockerfile
    container_name: sowknow4-guardian-hc
    restart: unless-stopped
    logging: *default-logging
    pid: "host"
    privileged: true
    security_opt:
      - apparmor:unconfined
    profiles:
      - monitoring
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - GMAIL_SMTP_USER=${GMAIL_SMTP_USER}
      - GMAIL_SMTP_PASSWORD=${GMAIL_SMTP_PASSWORD}
      # correlator.jsonl_write_failed fix 2026-04-11: default target is
      # /var/docker/sowknow4/logs which is not mounted in the container.
      # Use /tmp (writable, ephemeral — fine for incident jsonl).
      - GUARDIAN_LOG_DIR=/tmp
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./monitoring/guardian-hc/guardian-hc.sowknow4.yml:/config/guardian-hc.yml:ro
      - ./monitoring/guardian-hc/guardian_hc:/app/guardian_hc:ro
      - ./monitoring/guardian-hc/runbooks:/app/runbooks:ro
      - /proc:/host/proc:ro
    # NO ports -- dashboard is internal only, access via docker exec or SSH tunnel
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os,time; f='/tmp/guardian-heartbeat'; assert os.path.exists(f), 'no heartbeat'; age=time.time()-os.path.getmtime(f); assert age<600, f'heartbeat stale: {int(age)}s'\" || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    networks:
      - sowknow-net

  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: sowknow4-prometheus
    restart: unless-stopped
    logging: *default-logging
    profiles:
      - monitoring
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - sowknow-prometheus-data:/prometheus
    # NO ports — internal network only
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    networks:
      - sowknow-net

networks:
  sowknow-net:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.enable_icc: "true"

volumes:
  sowknow-postgres-data:
  sowknow-redis-data:
  sowknow-public-data:
  sowknow-confidential-data:
  sowknow-backups:
  sowknow-nats-data:
  sowknow-vault-data:
  sowknow-certbot-webroot:
  sowknow-model-cache:
  sowknow-audio-data:
  sowknow-prometheus-data:
  # sowknow-ollama-models: disabled — Ollama removed 2026-04-14, confidential routing uses OpenRouter
