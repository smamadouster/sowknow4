version: '3.8'

# Require .env file to be present for all services
x-common-env: &common-env
  env_file:
    - .env

# Global logging configuration for all services
# Enables centralized log collection and structured JSON logging
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"
    labels: "service,environment"
    tag: "{{.Name}}/{{.ID}}"

services:
  # PostgreSQL with pgvector
  postgres:
    <<: *common-env
    dns:
      - 8.8.8.8
      - 1.1.1.1
    image: pgvector/pgvector:pg16
    container_name: sowknow4-postgres
    restart: unless-stopped
    logging: *default-logging
    environment:
      - POSTGRES_DB=${DATABASE_NAME:-sowknow}
      - POSTGRES_USER=${DATABASE_USER:-sowknow}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD:?DATABASE_PASSWORD must be set in .env}
    volumes:
      - sowknow-postgres-data:/var/lib/postgresql/data
      - sowknow-backups:/backups
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sowknow"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          # Reduced from 2048M to fit within 6.4GB VPS budget.
          # 1536M is sufficient for pgvector with 5 concurrent users.
          memory: 1536M
          cpus: '1.5'
    networks:
      - sowknow-net

  # Redis for Celery
  redis:
    image: redis:7-alpine
    container_name: sowknow4-redis
    restart: unless-stopped
    logging: *default-logging
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
    volumes:
      - sowknow-redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=$REDIS_PASSWORD redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          # Reduced from 512M. Redis 7 Alpine typically uses 30-80MB;
          # 256M provides ample headroom for session/cache data.
          memory: 256M
          cpus: '0.5'
    networks:
      - sowknow-net

  # FastAPI Backend
  backend:
    <<: *common-env
    env_file:
      - .env
      - .secrets
    build:
      context: ./backend
      dockerfile: Dockerfile.minimal
    container_name: sowknow-backend
    restart: unless-stopped
    logging: *default-logging
    environment:
      - DATABASE_URL=postgresql://${DATABASE_USER:-sowknow}:${DATABASE_PASSWORD:?DATABASE_PASSWORD must be set in .env}@postgres:5432/${DATABASE_NAME:-sowknow}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set in .env}
      - KIMI_API_KEY=${KIMI_API_KEY}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=${VAULT_ROOT_TOKEN:-sowknow-dev-token}
      - NATS_URL=nats://nats:4222
      # CORS and Cookie Settings (CRITICAL for authentication)
      - APP_ENV=${APP_ENV:-production}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS},backend
      - COOKIE_DOMAIN=${COOKIE_DOMAIN}
    volumes:
      - sowknow-public-data:/data/public
      - sowknow-confidential-data:/data/confidential
      - sowknow-backups:/app/backups
      - ./backend:/app
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      vault:
        condition: service_healthy
      nats:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    networks:
      - sowknow-net

  # Celery Worker
  celery-worker:
    <<: *common-env
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: sowknow4-celery-worker
    restart: unless-stopped
    logging: *default-logging
    environment:
      - DATABASE_URL=postgresql://${DATABASE_USER:-sowknow}:${DATABASE_PASSWORD:?DATABASE_PASSWORD must be set in .env}@postgres:5432/${DATABASE_NAME:-sowknow}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - KIMI_API_KEY=${KIMI_API_KEY}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    volumes:
      - sowknow-public-data:/data/public
      - sowknow-confidential-data:/data/confidential
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      # Two-phase check:
      # 1. Broker reachability (fast path, always verified).
      # 2. Embedding model loaded in the worker process: inspects the active worker via
      #    celery inspect ping, then checks that EmbeddingService reports model loaded.
      #    If the model failed to load (OOM or missing package), this exits non-zero and
      #    Docker will restart the container before it processes documents with zero vectors.
      test: ["CMD-SHELL", "python -c \"\nimport os, sys\nfrom celery import Celery\nc = Celery('sowknow', broker=os.getenv('REDIS_URL', 'redis://redis:6379/0'))\ntry:\n    c.connection().connect()\nexcept Exception as e:\n    print(f'Broker unreachable: {e}'); sys.exit(1)\ntry:\n    from app.services.embedding_service import embedding_service\n    # Trigger lazy load; raises on hard failure\n    _ = embedding_service.model\n    if not embedding_service.can_embed:\n        print(f'Embedding model not ready: {embedding_service._load_error}'); sys.exit(1)\n    print('OK: broker reachable, embedding model loaded')\nexcept Exception as e:\n    print(f'Embedding check failed: {e}'); sys.exit(1)\n\" || exit 1"]
      interval: 90s
      timeout: 60s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          # 2560M provides headroom for multilingual-e5-large embedding model
          # (~1.3 GB) + Python overhead (~300 MB) + PyTorch buffers (~500 MB) = ~2.1 GB peak.
          # CRITICAL: concurrency MUST stay at 1. With fork pool, each worker process
          # gets its own private copy of the model after fork (lazy load = no CoW sharing).
          # Two workers × 2.1 GB = 4.2 GB > VPS budget → SIGKILL-9. One worker keeps peak
          # below 2560 M and total container budget stays within the 6.4 GB VPS limit.
          memory: 2560M
          cpus: '1.5'
    command: celery -A app.celery_app worker --loglevel=info --concurrency=1 -Q celery,document_processing,scheduled
    networks:
      - sowknow-net

  # Celery Beat
  celery-beat:
    <<: *common-env
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: sowknow4-celery-beat
    restart: unless-stopped
    logging: *default-logging
    environment:
      - DATABASE_URL=postgresql://${DATABASE_USER:-sowknow}:${DATABASE_PASSWORD:?DATABASE_PASSWORD must be set in .env}@postgres:5432/${DATABASE_NAME:-sowknow}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set in .env}
      - KIMI_API_KEY=${KIMI_API_KEY}
    command: celery -A app.celery_app beat --loglevel=info
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'celery.*beat' || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          # Beat only schedules tasks - 128MB is sufficient (~30-60MB actual).
          # Reduced to accommodate Vault + NATS within VPS budget.
          memory: 128M
          cpus: '0.25'
    networks:
      - sowknow-net

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sowknow-frontend
    restart: unless-stopped
    logging: *default-logging
    environment:
      - NEXT_PUBLIC_API_URL=/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    networks:
      - sowknow-net

  # Nginx Reverse Proxy
  # NOTE: Only enable if no other reverse proxy is using ports 80/443
  # If using existing caddy/nginx, set NGINX_ENABLED=false
  nginx:
    image: nginx:alpine
    container_name: sowknow4-nginx
    restart: unless-stopped
    logging: *default-logging
    profiles:
      - nginx  # Use: docker compose --profile nginx up -d
    volumes:
      - ./nginx/nginx-http-only.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    networks:
      - sowknow-net

  # Telegram Bot
  telegram-bot:
    <<: *common-env
    env_file:
      - .env
      - .secrets
    build:
      context: ./backend
      dockerfile: Dockerfile.telegram
    container_name: sowknow4-telegram-bot
    restart: on-failure  # exit(0) on bad token must NOT restart; only crash (non-zero) restarts
    logging: *default-logging
    environment:
      - DATABASE_URL=postgresql://${DATABASE_USER:-sowknow}:${DATABASE_PASSWORD:?DATABASE_PASSWORD must be set in .env}@postgres:5432/${DATABASE_NAME:-sowknow}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN must be set}
      - BACKEND_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'python.*telegram_bot' || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    networks:
      - sowknow-net

  # HashiCorp Vault — secret management (file backend for persistence)
  # First run: docker compose exec vault vault operator init -key-shares=1 -key-threshold=1
  # Then unseal: docker compose exec vault vault operator unseal <UNSEAL_KEY>
  vault:
    image: hashicorp/vault:1.15
    container_name: sowknow4-vault
    restart: unless-stopped
    logging: *default-logging
    environment:
      - VAULT_ADDR=http://127.0.0.1:8200
      - VAULT_API_ADDR=http://127.0.0.1:8200
      - VAULT_LOCAL_CONFIG={"storage":{"file":{"path":"/vault/data"}},"listener":{"tcp":{"address":"0.0.0.0:8200","tls_disable":"1"}},"disable_mlock":true,"ui":false}
    command: ["server"]
    volumes:
      - sowknow-vault-data:/vault/data
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD-SHELL", "vault status -address=http://127.0.0.1:8200 2>&1 | grep -qE 'Sealed.*false|Sealed.*true' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    networks:
      - sowknow-net

  # NATS — lightweight message broker with JetStream
  nats:
    image: nats:2.10-alpine
    container_name: sowknow4-nats
    restart: unless-stopped
    logging: *default-logging
    command: ["--jetstream", "--store_dir=/data", "-m", "8222"]
    volumes:
      - sowknow-nats-data:/data
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8222/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    networks:
      - sowknow-net

  # Prometheus for advanced metrics (optional - enable with --profile monitoring)
  prometheus:
    image: prom/prometheus:latest
    container_name: sowknow4-prometheus
    restart: unless-stopped
    logging: *default-logging
    profiles:
      - monitoring
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - sowknow-prometheus-data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    networks:
      - sowknow-net

networks:
  sowknow-net:
    driver: bridge

volumes:
  sowknow-postgres-data:
  sowknow-redis-data:
  sowknow-public-data:
  sowknow-confidential-data:
  sowknow-backups:
  sowknow-nats-data:
  sowknow-vault-data:
  sowknow-prometheus-data:
