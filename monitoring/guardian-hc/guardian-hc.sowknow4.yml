# Guardian HC v2.0 -- SOWKNOW4 Configuration
# Autonomous observability & self-healing agent
#
# Production: /var/docker/sowknow4
# Dev:        /home/development/src/active/sowknow4

version: "2.0"

app:
  name: "SOWKNOW4 Legacy Knowledge Vault"
  compose_file: "/var/docker/sowknow4/docker-compose.yml"

services:
  # --- Infrastructure ---

  - name: "postgres"
    container: "sowknow4-postgres"
    health_check:
      type: tcp
      host: postgres
      port: 5432
    auto_heal:
      restart: true

  - name: "redis"
    container: "sowknow4-redis"
    health_check:
      type: tcp
      host: redis
      port: 6379
    auto_heal:
      restart: true

  - name: "vault"
    container: "sowknow4-vault"
    health_check:
      type: tcp
      host: vault
      port: 8200
    auto_heal:
      restart: true

  - name: "nats"
    container: "sowknow4-nats"
    health_check:
      type: tcp
      host: nats
      port: 4222
    auto_heal:
      restart: true

  # --- Application ---

  - name: "backend"
    container: "sowknow4-backend"
    health_check:
      type: http
      url: "http://backend:8000/api/v1/health"
      timeout: 15
    auto_heal:
      restart: true
      rebuild_on_failure: true

  - name: "celery-light"
    container: "sowknow4-celery-light"
    health_check:
      type: container
    auto_heal:
      restart: true

  - name: "celery-heavy"
    container: "sowknow4-celery-heavy"
    health_check:
      type: container
    auto_heal:
      restart: true
      rebuild_on_failure: true

  - name: "celery-collections"
    container: "sowknow4-celery-collections"
    health_check:
      type: container
    auto_heal:
      restart: true

  - name: "celery-beat"
    container: "sowknow4-celery-beat"
    health_check:
      type: container
    auto_heal:
      restart: true

  - name: "frontend"
    container: "sowknow4-frontend"
    health_check:
      type: http
      url: "http://frontend:3000/"
      timeout: 10
    auto_heal:
      restart: true
      rebuild_on_failure: true

  - name: "telegram-bot"
    container: "sowknow4-telegram-bot"
    health_check:
      type: container
    auto_heal:
      restart: true

alerts:
  telegram:
    token: "${TELEGRAM_BOT_TOKEN}"
    chat_id: "${TELEGRAM_CHAT_ID}"
  email:
    smtp_host: "smtp.gmail.com"
    smtp_port: 587
    smtp_user: "${GMAIL_SMTP_USER}"
    smtp_password: "${GMAIL_SMTP_PASSWORD}"
    from: "${GMAIL_SMTP_USER}"
    to: "smamadouster@gmail.com"

patrols:
  critical:
    interval: "2m"
    checks: [containers, api_health]
  standard:
    interval: "10m"
    checks: [containers, api_health, disk, memory, network_health, ollama_health, vps_load]
  deep:
    interval: "1h"
    checks: [containers, api_health, disk, memory, ssl, config_drift, network_health, ollama_health, vps_load]

disk:
  warning_threshold: 70
  critical_threshold: 85
  emergency_threshold: 90
  auto_clean:
    docker_prune: true
    log_max_size: "50M"

ssl:
  domains:
    - "sowknow.gollamtech.com"
  auto_renew: true
  warning_days: 14
  critical_days: 3

celery:
  redis_host: "redis"
  redis_port: 6379
  redis_password: "${REDIS_PASSWORD}"
  max_queue_depth: 200
  worker_container: "sowknow4-celery-light"
  beat_container: "sowknow4-celery-beat"

ollama:
  enabled: false  # Ollama removed from project -- confidential routing uses metadata-only approach
  url: "http://host.docker.internal:11434"

vps_load:
  load_threshold: 6.0
  steal_threshold: 20.0

# Docker network health -- detects stale nftables rules from dead bridges
# (Docker 29.x bug: raw PREROUTING rules not cleaned up on network destroy)
network:
  probe_pairs:
    - from: "sowknow4-backend"
      to_host: "redis"
      to_port: 6379
    - from: "sowknow4-backend"
      to_host: "postgres"
      to_port: 5432

dashboard:
  port: 9090

# --- v2: Plugin System ---

plugins:
  infrastructure:
    enabled: true
  probes:
    enabled: true
    service_account: "guardian-probe"
  sentinel:
    enabled: true
  trends:
    enabled: true
    retention_raw: "48h"
    retention_hourly: "14d"
  memory:
    enabled: true
    bootstrap_sources:
      - "/var/docker/sowknow4/.wolf/buglog.json"
      - "/var/docker/sowknow4/logs/incidents.jsonl"

modules:
  - name: "Authentication Service"
    services: [backend]
    probes: [jwt_validity, auth_flow]
  - name: "Document Pipeline"
    services: [celery-heavy, celery-light, backend]
    probes: [embedding_pipeline, celery_completion]
  - name: "Search & Retrieval"
    services: [backend, postgres]
    probes: [query_latency]
  - name: "Collections Engine"
    services: [celery-collections, backend]
    probes: [celery_completion]
  - name: "Chat / LLM Service"
    services: [backend]
    probes: [llm_connectivity]
  - name: "Telegram Bot"
    services: [telegram-bot]
    probes: [bot_responsiveness]
  - name: "Storage Layer"
    services: [postgres, redis, vault]
    probes: [redis_deep, postgres_deep, vault_unseal]
  - name: "Infrastructure"
    services: [frontend, backend]
    probes: [nginx_upstream, disk, memory, network, ssl]

database:
  host: "postgres"
  port: 5432
  dbname: "sowknow"
  user: "guardian"
  password: "${GUARDIAN_DB_PASSWORD}"
  fallback_sqlite: "/tmp/guardian-metrics-buffer.db"

agents:
  - id: "GA-0"
    name: "Watcher"
    role: "monitor"
    plugins: [probes, sentinel]
  - id: "GA-1"
    name: "Healer"
    role: "heal-executor"
  - id: "GA-2"
    name: "Debugger"
    role: "correlator"
  - id: "GA-3"
    name: "Learner"
    role: "learning"
    plugins: [memory]
  - id: "GA-4"
    name: "Reporter"
    role: "reporting"
  - id: "GA-5"
    name: "Archivist"
    role: "metrics"
    plugins: [trends]

runbooks_dir: "/app/runbooks"

daily_report:
  time: "06:00"
  timezone: "America/Toronto"
  channels: [telegram, email]
