name: embed_server_deep
description: >
  Embed server passes /health but fails to generate actual vectors on /embed.
  Usually means the uvicorn worker is mid-restart (--limit-max-requests)
  or the PyTorch model crashed.  Before restarting we check if the pipeline.embed
  queue is flooded; if so we purge it to prevent an immediate cascade regression.

triggers:
  - check_name: embed_server_deep

steps:
  # Step 1: Quick double-check before restarting anything
  - id: verify_unhealthy
    name: "Re-verify /embed endpoint"
    action: exec
    container: sowknow4-backend
    command: >-
      python3 -c "
      import httpx, os, sys;
      url = os.getenv('EMBED_SERVER_URL', 'http://embed-server:8000') + '/embed';
      try:
          r = httpx.post(url, json={'texts': ['probe'], 'batch_size': 1}, timeout=10);
          if r.status_code == 200 and len(r.json()[0]) == 1024:
              print('HEALTHY');
              sys.exit(0);
      except Exception as e:
          pass;
      print('UNHEALTHY');
      sys.exit(1);
      "
    expect_in_stdout: "UNHEALTHY"
    timeout: 20
    on_success: check_queue_depth
    on_failure: resolved  # it healed itself in the meantime

  # Step 2: Check if the embed queue is flooded (prevents cascade on restart)
  - id: check_queue_depth
    name: "Check pipeline.embed queue depth"
    action: exec
    container: sowknow4-redis
    command: >-
      redis-cli {redis_auth} LLEN pipeline.embed
    expect_returncode: 0
    timeout: 10
    on_success: purge_if_flooded
    on_failure: restart_embed_server

  # Step 3: Purge queue if it is dangerously deep
  - id: purge_if_flooded
    name: "Purge pipeline.embed if flooded"
    action: exec
    container: sowknow4-redis
    command: >-
      DEPTH=$(redis-cli {redis_auth} LLEN pipeline.embed);
      if [ "$DEPTH" -gt 250 ]; then
        redis-cli {redis_auth} LTRIM pipeline.embed 1 0 && echo "PURGED";
      else
        echo "OK";
      fi
    expect_in_stdout: "OK"
    timeout: 10
    on_success: restart_embed_server
    on_failure: restart_embed_server

  # Step 4: Restart embed-server
  - id: restart_embed_server
    name: "Restart embed-server container"
    action: restart_container
    container: sowknow4-embed-server
    wait_after: 30
    on_success: verify_after_restart
    on_failure: escalate

  # Step 5: Verify /embed works after restart
  - id: verify_after_restart
    name: "Verify embed server generates vectors post-restart"
    action: exec
    container: sowknow4-backend
    command: >-
      python3 -c "
      import httpx, os, sys, time;
      url = os.getenv('EMBED_SERVER_URL', 'http://embed-server:8000') + '/embed';
      for i in range(6):
          try:
              r = httpx.post(url, json={'texts': ['probe'], 'batch_size': 1}, timeout=10);
              if r.status_code == 200 and len(r.json()[0]) == 1024:
                  print('HEALTHY');
                  sys.exit(0);
          except Exception:
              pass;
          time.sleep(5);
      print('STILL_UNHEALTHY');
      sys.exit(1);
      "
    expect_in_stdout: "HEALTHY"
    timeout: 45
    on_success: resolved
    on_failure: escalate

  # Terminals
  - id: resolved
    name: "Embed server recovered"
    action: resolved
    terminal: true

  - id: escalate
    name: "Escalate: embed server still failing after restart"
    action: alert
    message: >-
      🔴 *Guardian runbook: embed_server_deep — ESCALATED*

      Embed server restarted but still cannot generate vectors.
      Manual investigation needed:
      • `docker logs sowknow4-embed-server`
      • Check model disk space: `docker exec sowknow4-embed-server df -h /models`
      • Check for OOM: `dmesg | grep -i oom`
    terminal: true
