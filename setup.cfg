[flake8]
max-line-length = 120
# E203: whitespace before ':' — black's slice formatting conflicts with flake8
# E501: line too long — handled by max-line-length
# W503: line break before binary operator — conflicts with black
# E226: missing whitespace around arithmetic operator — intentional in numeric code
# F401: imported but unused — many service files import for type hints / re-export
# F841: local variable assigned but never used — pre-existing in service stubs
# F541: f-string without placeholders — pre-existing in service files
# F821: undefined name — pre-existing (cv2, db in optional-import patterns)
# F811: redefinition — pre-existing in service files
extend-ignore = E203, E501, W503, E226, F401, F841, F541, F821, F811, E711
